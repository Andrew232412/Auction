version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: auction_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: auction_db
    networks:
      - auction_network

  backend:
    build: ./backend
    container_name: auction_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      DATABASE_NAME: auction_db
      JWT_SECRET_KEY: your-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    depends_on:
      - mongodb
    networks:
      - auction_network
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: auction_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - auction_network

volumes:
  mongodb_data:

networks:
  auction_network:
    driver: bridge
